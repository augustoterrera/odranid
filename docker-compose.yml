services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odranid}
      POSTGRES_USER: ${POSTGRES_USER:-odranid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odranid}
    # Solo loopback del host: nunca expuesto a internet. localhost sigue funcionando
    # para dev/psql; en el VPS solo se alcanza desde la propia máquina.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-2g}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-odranid} -d $${POSTGRES_DB:-odranid}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: pgvector/pgvector:pg16
    profiles: ["local-db"]
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
    volumes:
      - ./postgres/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'for file in /migrations/*.sql; do
        echo "applying $$file";
        psql "$$ODRANID_DATABASE_URL" -v ON_ERROR_STOP=1 -f "$$file";
      done'

  api:
    build: .
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
      ODRANID_CELERY_BROKER_URL: redis://dragonfly:6379/0
      ODRANID_CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
      ODRANID_TYPESENSE_HOST: ${ODRANID_TYPESENSE_HOST:-typesense}
    # Loopback para debug local / acceso por Tailscale; el tráfico público entra por Traefik.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      dragonfly:
        condition: service_healthy
      typesense:
        condition: service_healthy
    # Varios workers para aguantar concurrencia (cada uno con su propia cache TTL en memoria).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-2}
    networks:
      - default   # red interna de compose: dragonfly, typesense, postgres
      - proxy      # red de Traefik (externa)
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # SOLO el webhook de Chatwoot queda público (incluye /webhooks/chatwoot/health).
      # El resto (/agent, /search, /admin/*) NO se rutea: se accede por la tailnet.
      # Para exponer TODO el dominio, reemplazar la rule por: Host(`${ODRANID_PUBLIC_DOMAIN}`)
      - "traefik.http.routers.odranid.rule=Host(`${ODRANID_PUBLIC_DOMAIN}`) && PathPrefix(`/webhooks`)"
      - "traefik.http.routers.odranid.entrypoints=websecure"
      - "traefik.http.routers.odranid.tls.certresolver=letsencrypt"
      - "traefik.http.services.odranid.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-1g}

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    command: ["--logtostderr"]
    # Solo loopback: el broker no debe ser accesible desde internet.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - dragonfly_data:/data
    deploy:
      resources:
        limits:
          memory: ${DRAGONFLY_MEM_LIMIT:-1g}
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  typesense:
    image: typesense/typesense:27.1
    command:
      - "--data-dir"
      - "/data"
      - "--api-key=${ODRANID_TYPESENSE_API_KEY:-localdevkey}"
      - "--enable-cors"
    # Solo loopback: el índice no debe ser accesible desde internet.
    ports:
      - "127.0.0.1:8108:8108"
    volumes:
      - typesense_data:/data
    deploy:
      resources:
        limits:
          memory: ${TYPESENSE_MEM_LIMIT:-2g}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8108 && printf \"GET /health HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"\\\"ok\\\":true\" <&3'"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker_messages:
    build: .
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
      ODRANID_CELERY_BROKER_URL: redis://dragonfly:6379/0
      ODRANID_CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
      ODRANID_TYPESENSE_HOST: ${ODRANID_TYPESENSE_HOST:-typesense}
    depends_on:
      dragonfly:
        condition: service_healthy
      typesense:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app worker -Q chatwoot_messages --loglevel=INFO --concurrency=4
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEM_LIMIT:-1g}

  worker_outbound:
    build: .
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
      ODRANID_CELERY_BROKER_URL: redis://dragonfly:6379/0
      ODRANID_CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
    depends_on:
      dragonfly:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app worker -Q chatwoot_outbound --loglevel=INFO --concurrency=2
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEM_LIMIT:-1g}

  # Worker dedicado al sync del catálogo (WooCommerce -> Postgres -> Typesense).
  # Aislado de chatwoot_messages para que un sync pesado no demore las respuestas al cliente.
  worker_catalog:
    build: .
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
      ODRANID_CELERY_BROKER_URL: redis://dragonfly:6379/0
      ODRANID_CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
      ODRANID_TYPESENSE_HOST: ${ODRANID_TYPESENSE_HOST:-typesense}
    depends_on:
      dragonfly:
        condition: service_healthy
      typesense:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app worker -Q catalog --loglevel=INFO --concurrency=1
    deploy:
      resources:
        limits:
          memory: ${CATALOG_WORKER_MEM_LIMIT:-1500m}

  beat:
    build: .
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
      ODRANID_CELERY_BROKER_URL: redis://dragonfly:6379/0
      ODRANID_CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
      ODRANID_TYPESENSE_HOST: ${ODRANID_TYPESENSE_HOST:-typesense}
    depends_on:
      dragonfly:
        condition: service_healthy
      typesense:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app beat --loglevel=INFO

  flower:
    build: .
    profiles: ["observability"]
    env_file:
      - .env
    environment:
      ODRANID_DATABASE_URL: ${ODRANID_DATABASE_URL:-postgresql://odranid:odranid@postgres:5432/odranid}
      ODRANID_CELERY_BROKER_URL: redis://dragonfly:6379/0
      ODRANID_CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
    # Loopback + basic auth: el panel de Celery no debe quedar abierto en internet.
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      dragonfly:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app flower --port=5555 --basic-auth=${FLOWER_BASIC_AUTH:-admin:changeme}

# El reverse proxy + TLS lo provee el Traefik ya existente del VPS (red externa "proxy",
# entrypoint websecure, certresolver letsencrypt). La API se integra por labels (ver servicio
# api). No se incluye un proxy propio para no competir por los puertos 80/443.

networks:
  # Red externa donde corre Traefik. Creada fuera de este compose: docker network create proxy
  proxy:
    external: true

volumes:
  postgres_data:
  dragonfly_data:
  typesense_data:
